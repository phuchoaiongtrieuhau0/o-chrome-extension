<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Cài đặt Extension</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Cài đặt</h1>
    <section>
      <h2>Thông tin phiên bản</h2>
      <p>Phiên bản hiện tại: <strong id="current-version"></strong></p>
      <p>Phiên bản mới nhất: <strong id="latest-version">—</strong></p>
      <button id="btn-check">Kiểm tra cập nhật</button>
    </section>
    <section>
      <h2>Các giá trị cố định (Variables)</h2>
      <div id="vars-container"></div>
      <button id="btn-add-var">Thêm biến</button>
      <button id="btn-save-vars">Lưu</button>
      <span id="vars-status" style="margin-left: 10px; color: var(--success-color);"></span>
    </section>
    <!-- Thêm section cài đặt cho từng feature vào đây -->
  </div>
  <script src="options.js" type="module"></script>
</body>
</html>
