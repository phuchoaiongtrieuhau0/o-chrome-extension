<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="title-row">
        <span class="name">My Extension</span>
        <span class="version-badge" id="version-badge">v1.0.0</span>
      </div>
      <div class="status-row" id="status-row">
        <span class="dot dot--ok"></span>
        <span id="status-text">Kiểm tra cập nhật...</span>
        <a href="#" id="link-manage-ext" style="margin-left: auto; font-size: 10px; color: #818cf8; text-decoration: underline;">Quản lý Extension</a>
      </div>
    </header>

    <main>
      <button class="btn btn--secondary" id="btn-check-update">
        ⟳ Kiểm tra cập nhật
      </button>

      <div id="update-actions" style="display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #1e1e28; flex-direction: column; gap: 6px;">
        <div style="font-size: 11px; color: #818cf8; margin-bottom: 4px;">Tải bản mới:</div>
        <div style="display: flex; gap: 6px;">
          <button class="btn btn--secondary" id="btn-download-zip" style="flex: 1; padding: 5px;">📦 ZIP</button>
          <button class="btn btn--secondary" id="btn-download-crx" style="flex: 1; padding: 5px;">💎 CRX</button>
        </div>
        <div style="margin-top: 4px; display: flex; flex-direction: column; gap: 4px;">
           <button class="btn btn--ghost" id="btn-choose-file">📁 Chọn file ZIP để cập nhật...</button>
           <input type="file" id="file-input" style="display: none;" accept=".zip">
           <button class="btn btn--ghost" id="btn-reload" style="border-color: #22c55e; color: #22c55e;">⚡ Reload Extension</button>
        </div>
      </div>

      <button class="btn btn--secondary" id="btn-open-sidepanel">
        ⊞ Mở Side Panel
      </button>
      <button class="btn btn--ghost" id="btn-options">
        ⚙ Cài đặt
      </button>
    </main>

    <footer>
      <span id="update-info"></span>
    </footer>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
