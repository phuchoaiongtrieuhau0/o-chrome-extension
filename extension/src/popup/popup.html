<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="title-row">
        <span class="name">My Extension</span>
        <span class="version-badge" id="version-badge">v1.0.0</span>
      </div>
      <div class="status-row">
        <span class="dot dot--loading"></span>
        <span id="status-text">Đang tải...</span>
        <a href="#" id="link-manage-ext">Quản lý</a>
      </div>
    </header>

    <nav class="tabs-nav">
      <button class="tab-btn active" data-tab="home">🏠 Home</button>
      <button class="tab-btn" data-tab="admin">🛡 Quản trị</button>
    </nav>

    <main>
      <!-- Tab Home -->
      <div id="tab-home" class="tab-content active">
        <div class="card">
          <p style="font-size: 13px; margin-bottom: 12px; color: var(--text-secondary);">
            Chào mừng bạn đến với My Extension. Chọn chức năng từ menu để bắt đầu.
          </p>
          <button class="btn btn--primary" id="btn-open-sidepanel">
            <span>⊞</span> Mở Side Panel
          </button>
        </div>
        <button class="btn btn--ghost" id="btn-options" style="margin-top: 8px;">
          <span>⚙</span> Cài đặt
        </button>
      </div>

      <!-- Tab Admin -->
      <div id="tab-admin" class="tab-content">
        <div class="card">
          <h3 class="section-title">Cập nhật hệ thống</h3>
          <button class="btn btn--secondary" id="btn-check-update" style="margin-bottom: 12px;">
            <span>⟳</span> Kiểm tra bản mới
          </button>
          
          <div id="update-files-list" style="display: flex; flex-direction: column; gap: 8px;">
            <div class="update-item">
              <div class="file-info">
                <span class="file-name">extension.zip</span>
              </div>
              <div class="action-btns">
                <button class="mini-btn" id="btn-copy-zip" title="Copy link">📋</button>
                <button class="mini-btn" id="btn-download-zip" title="Tải về">📥</button>
              </div>
            </div>
            <div class="update-item">
              <div class="file-info">
                <span class="file-name">extension.crx</span>
              </div>
              <div class="action-btns">
                <button class="mini-btn" id="btn-copy-crx" title="Copy link">📋</button>
                <button class="mini-btn" id="btn-download-crx" title="Tải về">📥</button>
              </div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top: 12px;">
          <h3 class="section-title">Công cụ</h3>
          <button class="btn btn--ghost" id="btn-choose-file" style="margin-bottom: 8px; border-style: dashed;">
            <span>📁</span> Cài từ file ZIP
          </button>
          <input type="file" id="file-input" style="display: none;" accept=".zip">
          <button class="btn btn--ghost" id="btn-reload" style="color: var(--success); border-color: rgba(34, 197, 94, 0.2);">
            <span>⚡</span> Reload Extension
          </button>
        </div>

        <div class="card" style="margin-top: 12px;">
          <h3 class="section-title">Inspect & Logs</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button class="btn btn--ghost" id="btn-inspect-popup" style="padding: 8px; font-size: 11px;">
              <span>🔍</span> Popup
            </button>
            <button class="btn btn--ghost" id="btn-inspect-bg" style="padding: 8px; font-size: 11px;">
              <span>🤖</span> Background
            </button>
            <button class="btn btn--ghost" id="btn-inspect-options" style="padding: 8px; font-size: 11px;">
              <span>⚙</span> Options
            </button>
            <button class="btn btn--ghost" id="btn-inspect-sidepanel" style="padding: 8px; font-size: 11px;">
              <span>⊞</span> Side Panel
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <span id="update-info"></span>
    </footer>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
